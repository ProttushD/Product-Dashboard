<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard | By Prottush</title>

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="pd-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <div class="main">

        <div class="heading glass">
            <h1>
                Project Dashboard
            </h1>

            <a href="" target="_blank"><i class="ri-github-fill"></i></a>
        </div>


        <div class="clock glass">

            <div class="clock-left">
                <h5 id="date">Date </h5>
                <h5 id="day" class="f-20">Day</h5>
                <h5 id="time" class="f-30">Time</h5>
                <h5 id="location">Location</h5>
              
            </div>
            <div class="clock-right">
                <div class="clock-r-top">
                    <h2 id="temp" class="f-30">Temperature</h2>
                    <p id="weather-condition" class="f-25">Weater Condition</p>
                </div>
                <div class="clock-r-bottom">
                    <p id="heat-index" class="f-15">Heat Index</p>
                    <p id="humidity" class="f-15">Humidity</p>
                    <p id="wind" class="f-15">Wind</p>
                </div>
            </div>
        </div>


        <div class="options glass">
            <div class="option">
                <div class="circle glass">
                    <i class="ri-file-list-3-line" style="color: rgb(28, 0, 93);"></i>
                </div>
                <div class="circle glass">
                    <i class="ri-calendar-todo-fill" style="color: rgb(0, 88, 21);"></i>
                </div>
                <div class="circle glass">
                    <i class="fa-solid fa-hand-fist" style="color: rgb(93, 0, 74);"></i>
                </div>
                <div class="circle glass">
                    <i class="ri-timer-fill"  style="color: rgb(93, 0, 0);"></i>
                </div>
                <div class="circle glass">
                    <i class="ri-target-fill" style="color: rgb(129, 136, 0);"></i>
                </div>
            </div>
        </div>
        
    </div>






    <script src="main.js"></script>

</body>

</html>
