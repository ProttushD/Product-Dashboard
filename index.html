<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard | By Prottush</title>

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="pd-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <div class="main">
        <div class="dashboard">

            <div class="heading glass">
                <h1>
                    Project Dashboard
                </h1>

                <a href="https://github.com/ProttushD/Product-Dashboard" target="_blank"><i class="ri-github-fill"></i></a>
            </div>


            <div class="clock glass">

                <div class="clock-left">
                    <h5 id="date">Date </h5>
                    <h5 id="day" class="f-20">Day</h5>
                    <h5 id="time" class="f-30">Time</h5>
                    <h5 id="location">Location</h5>

                </div>
                <div class="clock-right">
                    <div class="clock-r-top">
                        <h2 id="temp" class="f-30">Temperature</h2>
                        <p id="weather-condition" class="f-25">Weater Condition</p>
                    </div>
                    <div class="clock-r-bottom">
                        <p id="heat-index" class="f-15">Heat Index</p>
                        <p id="humidity" class="f-15">Humidity</p>
                        <p id="wind" class="f-15">Wind</p>
                    </div>
                </div>
            </div>


            <div class="options glass">
                <div class="option">
                    <div class="circle glass" id="taskbtn">
                        <i class="ri-file-list-3-line" style="color: rgb(28, 0, 93);"></i>
                    </div>
                    <div class="circle glass" id="calenderbtn">
                        <i class="ri-calendar-todo-fill" style="color: rgb(0, 88, 84);"></i>
                    </div>
                    <div class="circle glass" id="quotebtn">
                        <i class="fa-solid fa-hand-fist" style="color: rgb(93, 0, 74);"></i>
                    </div>
                    <div class="circle glass" id="stopwatchbtn">
                        <i class="ri-timer-fill" style="color: rgb(93, 0, 0);"></i>
                    </div>
                    <div class="circle glass" id="goalbtn">
                        <i class="ri-target-fill" style="color: rgb(129, 136, 0);"></i>
                    </div>
                </div>
            </div>

        </div>


        <div class="task-manager">
            <div class="task-manager-header glass">
                <h1 id="heading-title">

                </h1>
                <button id="closebtn">
                    <i class="ri-close-circle-line"></i>
                </button>
            </div>

            <div class="task-manager-body">

                <div class="task-manager-left glass">
                    <form id="task-form">
                        <input type="text" placeholder="Enter Task" id="task-input">
                        <textarea placeholder="Enter Description" id="description-input"></textarea>
                        <div class="select-check">
                            <input type="checkbox" id="important">
                            <label for="important">Mark As Important</label>
                        </div>
                        <button class="task-btn" type="submit" id="add-task">Add Task</button>
                    </form>
                </div>




                <div class="task-manager-right glass" id="task-container">
                    <!-- <div class="task">
                         <h3>hola</h3>
                        <p>lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.</p>
                        <p>Important: No</p> 
                        <div class="selections">
                            <button class="task-btn complete-btn">Completed</button>
                            <button class="task-btn delete-btn">Delete</button>
                        </div> 
                    </div> -->
                </div>
            </div>
        </div>

        <div class="calender">
            <div class="calender-header glass">
                <h1 id="calender-heading-title">

                </h1>
                <button id="calender-closebtn">
                    <i class="ri-close-circle-line"></i>
                </button>
            </div>

            <div class="calender-body ">
                <div class="calender-card glass" id="calender-container">
                    <!-- <div class="calender-cards glass">
                        <h5>10:00 - 11:00</h5>
                        <p>......</p>

                    </div> -->

                </div>

            </div>

        </div>


        <div class="quote">
            <div class="quote-header glass">
                <h1 id="quote-heading-title">

                </h1>
                <button id="quote-closebtn">
                    <i class="ri-close-circle-line"></i>
                </button>
            </div>

            <div class="quote-body">
                <div class="quote-card glass">
                    <h5 id="quote-text">❝ ❞</h5>
                    <p id="quote-author">Author</p>
                </div>
            </div>

        </div>


        <div class="stop-watch">

            <div class="stop-watch-header glass">
                <h1 id="stop-watch-heading-title">

                </h1>
                <button id="stop-watch-closebtn">
                    <i class="ri-close-circle-line"></i>
                </button>
            </div>

            <div class="stop-watch-body">
                <div class="stop-watch-box glass">
                    <div class="stop-watch-top">
                        <div class="stop-watch-screen glass">
                            <h5 id="hour">HH</h5>
                            <h5 id="minutes">MM</h5>
                            <h5 id="seconds">SS</h5>
                            <h5 id="milliseconds">MS</h5>

                        </div>
                    </div>
                    <div class="stop-watch-bottom">
                        <div class="stop-watch-buttons">
                            <button class="task-btn complete-btn" id="start-btn"><i class="ri-play-line"></i>
                                Start</button>
                            <button class="task-btn pause-btn" id="pause-btn"><i class="ri-pause-circle-line"></i>
                                Pause</button>
                            <button class="task-btn delete-btn" id="reset-btn"><i class="ri-loop-left-line"></i>
                                Reset</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="goal">
                <div class="goal-header glass">
                    <h1 id="goal-heading-title">

                    </h1>
                    <button id="goal-closebtn">
                        <i class="ri-close-circle-line"></i>
                    </button>
                </div>



                <div class="goal-body">

                    <div class="goal-left glass">
                        <form id="goal-form">
                            <input type="text" placeholder="Enter Goal" id="goal-input">
                            <textarea placeholder="Enter Description" id="goal-description-input"></textarea>
                            
                            <button class="goal-btn" type="submit" id="add-goal">Add Task</button>
                        </form>
                    </div>




                    <div class="goal-right glass" id="goal-container">
                        
                    </div>
                </div>

            </div>





    </div>






    <script src="main.js"></script>
    <script src="task-manager.js"></script>
    <script src="calender.js"></script>
    <script src="quote.js"></script>
    <script src="stop-watch.js"></script>
    <script src="goal.js"></script>

</body>

</html>
